name: Deploy southwestliquorstore to Hostinger VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build Next.js app and deploy via SSH

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build Next.js app
        run: npm run build

      - name: Sync app to VPS via rsync
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /srv/sites/southwestliquorstore.com
            git pull origin main
            npm ci --omit=dev
            npm run build
            pm2 restart southwestliquorstore || pm2 start npm --name "southwestliquorstore" -- start
            echo "Deployment complete at $(date)"
