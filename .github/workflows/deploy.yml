name: Deploy southwestliquorstore to Hostinger VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy via SSH to VPS

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /srv/sites/southwestliquorstore.com
            git pull origin main
            npm ci --omit=dev
            npm run build
            pm2 restart southwestliquorstore || pm2 start npm --name "southwestliquorstore" -- start
            echo "Deployment complete at $(date)"
